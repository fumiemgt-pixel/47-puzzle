<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>北海道パズル — 47都道府県めぐり</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景装飾スノーフレーク -->
  <div class="bg-deco" aria-hidden="true">
    <span class="snowflake s1">❄</span>
    <span class="snowflake s2">❄</span>
    <span class="snowflake s3">❄</span>
    <span class="snowflake s4">❄</span>
    <span class="snowflake s5">❄</span>
    <span class="snowflake s6">❄</span>
  </div>

  <div class="app-shell">

    <!-- ヘッダー -->
    <header class="hdr">
      <div class="hdr-left">
        <span class="hdr-num">STAGE 01</span>
        <h1 class="hdr-name">北海道</h1>
      </div>
      <div class="hdr-right">
        <div class="score-pill">
          <span class="score-pill-lbl">スコア</span>
          <span class="score-pill-val" id="score-display">0</span>
        </div>
        <div class="score-pill accent">
          <span class="score-pill-lbl">目標</span>
          <span class="score-pill-val" id="target-display">2000</span>
        </div>
      </div>
    </header>

    <!-- 進捗バー -->
    <div class="prog-wrap">
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <span class="prog-pct" id="prog-pct">0 / 2000</span>
    </div>

    <!-- フラッシュメッセージ -->
    <div class="flash" id="flash" aria-live="polite"></div>

    <!-- 盤面 -->
    <main class="board-wrap">
      <div class="board" id="board"></div>
    </main>

    <!-- フッター -->
    <footer class="ftr">
      <button class="btn ghost" id="btn-stages">📋 ステージ一覧</button>
      <button class="btn primary" id="btn-restart">🔄 リスタート</button>
    </footer>

  </div>

  <!-- クリアモーダル -->
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <div class="modal-burst">🎉</div>
      <h2 class="modal-title">北海道 クリア！</h2>
      <p class="modal-sub">おめでとうございます！</p>
      <div class="modal-score-box">
        <span class="modal-score-lbl">最終スコア</span>
        <span class="modal-score-val" id="modal-score">0</span>
      </div>
      <div class="modal-icons">❄️ 🦀 🐄 🧀 🌽 🦊</div>
      <button class="btn primary wide" id="btn-again">もう一度プレイ 🔄</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
